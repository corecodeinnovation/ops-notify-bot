services:
  bot:
    build: .
    container_name: ops-notify-bot
    networks:
      - cci-net
    env_file: .env
    environment:
      PORT: 3001
    ports: ["3007:3001"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # GID del grupo dueño del socket: en Linux `stat -c '%g' /var/run/docker.sock`
    group_add:
      - "${DOCKER_GID:-0}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s

networks:
  cci-net:
    external: true
